<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Global Error:', msg, 'at', url, ':', lineNo);
            const loader = document.getElementById('loading-screen');
            if (loader) loader.style.display = 'none';
            return false;
        };
        setTimeout(function() {
            const loader = document.getElementById('loading-screen');
            if (loader && loader.style.display !== 'none') {
                loader.style.display = 'none';
            }
        }, 5000);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Servly Pro | نظام الإدارة الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f43f5e;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; margin: 0; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #0f172a; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; border-radius: 12px; padding: 12px; width: 100%; }
        .sidebar { width: 280px; height: 100vh; position: fixed; right: 0; top: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 50; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; margin: 4px 12px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; margin-left: 12px; }
        .main-content { margin-right: 280px; padding: 40px; }
        .badge { padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .order-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; }
        @media (max-width: 1024px) { .sidebar { display: none; } .main-content { margin-right: 0; } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="app">
        <div id="loading-screen" class="fixed inset-0 z-[100] bg-[#0f172a] flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <h2 class="text-xl font-bold text-white">Servly Pro</h2>
            </div>
        </div>

        <!-- Login Page -->
        <div id="login-page" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="glass-card p-8 w-full max-w-md">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold mb-2">تسجيل الدخول</h2>
                    <p class="text-slate-400">مرحباً بك في Servly Pro</p>
                </div>
                <form id="login-form" class="space-y-6">
                    <input type="email" id="login-email" class="glass-input" placeholder="البريد الإلكتروني" required>
                    <input type="password" id="login-password" class="glass-input" placeholder="كلمة المرور" required>
                    <button type="submit" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all">دخول</button>
                </form>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-dashboard" class="hidden min-h-screen p-8">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold">لوحة التحكم المركزية</h1>
                    <div class="flex gap-4">
                        <button onclick="showModal('add-shop-modal')" class="bg-indigo-600 px-6 py-3 rounded-xl font-bold">إضافة متجر جديد</button>
                        <button onclick="logout()" class="text-slate-400 hover:text-white">خروج</button>
                    </div>
                </div>
                <div id="admin-shops-list" class="grid gap-6"></div>
            </div>
        </div>

        <!-- Shop Dashboard -->
        <div id="shop-dashboard" class="hidden min-h-screen">
            <aside class="sidebar">
                <div class="p-8 text-center">
                    <h1 class="text-2xl font-bold text-indigo-500">Servly</h1>
                    <div id="shop-plan-badge" class="mt-2"></div>
                </div>
                <nav class="mt-4">
                    <div class="nav-item active" onclick="showShopSection('current-orders')"><i class="fas fa-list-ul"></i><span>الطلبات</span></div>
                    <div class="nav-item" onclick="showShopSection('stats')"><i class="fas fa-chart-line"></i><span>الإحصائيات</span></div>
                    <div class="nav-item" onclick="showShopSection('settings')"><i class="fas fa-cog"></i><span>الإعدادات</span></div>
                    <div class="mt-auto p-4"><button onclick="logout()" class="nav-item w-full text-rose-400"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button></div>
                </nav>
            </aside>
            <main class="main-content">
                <header class="flex justify-between items-center mb-8">
                    <div>
                        <h2 id="shop-name-display" class="text-3xl font-bold">مرحباً</h2>
                        <div id="usage-bar-container" class="mt-2 w-64 h-2 bg-white/5 rounded-full overflow-hidden">
                            <div id="usage-bar" class="h-full bg-indigo-500 transition-all" style="width: 0%"></div>
                        </div>
                        <p id="usage-text" class="text-xs text-slate-500 mt-1">الاستخدام: 0 / 0</p>
                    </div>
                    <button onclick="checkLimitAndShowModal()" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold shadow-lg">إضافة طلب جديد</button>
                </header>
                <div id="shop-sections">
                    <section id="current-orders-section" class="fade-in">
                        <div id="current-orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    </section>
                    <section id="stats-section" class="hidden fade-in">
                        <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                    </section>
                    <section id="settings-section" class="hidden fade-in">
                        <div class="glass-card p-8 max-w-2xl">
                            <h3 class="text-xl font-bold mb-6">إعدادات المتجر</h3>
                            <div id="customizations-info" class="mb-4 text-sm text-indigo-400"></div>
                            <form id="settings-form" class="space-y-4">
                                <input type="text" id="set-shop-name" class="glass-input" placeholder="اسم المتجر">
                                <input type="color" id="set-shop-color" class="glass-input h-12 p-1">
                                <button type="submit" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">حفظ</button>
                            </form>
                        </div>
                    </section>
                </div>
            </main>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <!-- Add Shop Modal (Admin) -->
            <div id="add-shop-modal" class="hidden glass-card p-8 w-full max-w-md">
                <h3 class="text-2xl font-bold mb-6">إضافة متجر جديد</h3>
                <form id="add-shop-form" class="space-y-4">
                    <input type="text" id="admin-shop-name" class="glass-input" placeholder="اسم المتجر" required>
                    <input type="text" id="admin-shop-uid" class="glass-input" placeholder="UID الخاص بالمتجر" required>
                    <select id="admin-shop-type" class="glass-input bg-[#1e293b]" required>
                        <option value="laundry">🧺 مغسلة</option>
                        <option value="barber">✂️ حلاق</option>
                        <option value="tailor">👔 خياط</option>
                        <option value="workshop">🔧 ورشة</option>
                        <option value="repair">📱 صيانة</option>
                        <option value="services">🖨️ خدمات</option>
                    </select>
                    <select id="admin-shop-plan" class="glass-input bg-[#1e293b]" required>
                        <option value="basic">🟢 Basic (99 SR)</option>
                        <option value="pro">🔵 Pro (199 SR)</option>
                        <option value="business">🔴 Business (299 SR)</option>
                    </select>
                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold">إنشاء</button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">إلغاء</button>
                    </div>
                </form>
            </div>

            <!-- Add Order Modal (Shop) -->
            <div id="add-order-modal" class="hidden glass-card p-8 w-full max-w-md">
                <h3 class="text-2xl font-bold mb-6">إضافة طلب جديد</h3>
                <form id="add-order-form" class="space-y-4">
                    <div id="dynamic-fields" class="space-y-4"></div>
                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold">تأكيد</button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD453-ZcJTTYn09u_JwVjR8_nTWP_bogas",
            authDomain: "servlysa.firebaseapp.com",
            databaseURL: "https://servlysa-default-rtdb.firebaseio.com",
            projectId: "servlysa",
            storageBucket: "servlysa.firebasestorage.app",
            messagingSenderId: "816156984476",
            appId: "1:816156984476:web:ba8ac8ee03cb4868215959",
            measurementId: "G-JESY21YY4X"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = 'meshari@servly.com';

        const SHOP_TYPES = {
            laundry: { name: 'مغسلة', icon: '🧺', fields: ['customerName', 'customerPhone', 'serviceType', 'price'], labels: { waiting: 'قيد التنفيذ', ready: 'جاهز' } },
            barber: { name: 'حلاق', icon: '✂️', fields: ['customerName', 'customerPhone', 'serviceName', 'bookingTime'], labels: { waiting: 'مؤكد', working: 'تم', ready: 'ملغي' } },
            tailor: { name: 'خياط', icon: '👔', fields: ['customerName', 'customerPhone', 'clothType', 'size', 'notes', 'deliveryDate'], labels: { waiting: 'جاري العمل', ready: 'جاهز', delivered: 'تم التسليم' } },
            workshop: { name: 'ورشة', icon: '🔧', fields: ['customerName', 'customerPhone', 'carType', 'problemDescription'], labels: { waiting: 'تم الاستلام', working: 'جاري الإصلاح', pending: 'بانتظار قطع', ready: 'جاهز' } },
            repair: { name: 'صيانة', icon: '📱', fields: ['customerName', 'customerPhone', 'deviceType', 'problemDescription'], labels: { waiting: 'قيد الفحص', working: 'جاري الإصلاح', ready: 'جاهز' } },
            services: { name: 'خدمات', icon: '🖨️', fields: ['customerName', 'customerPhone', 'serviceType'], labels: { waiting: 'قيد التنفيذ', ready: 'جاهز' } }
        };

        const PLANS = {
            basic: { name: 'Basic', limit: 300, price: 99, customizations: 0 },
            pro: { name: 'Pro', limit: 1000, price: 199, customizations: 1 },
            business: { name: 'Business', limit: 999999, price: 299, customizations: 3 }
        };

        const FIELD_LABELS = {
            customerName: 'اسم العميل', customerPhone: 'رقم الجوال', serviceType: 'نوع الخدمة', price: 'السعر',
            serviceName: 'اسم الخدمة', bookingTime: 'وقت الحجز', clothType: 'نوع الثوب', size: 'المقاس',
            notes: 'ملاحظات', deliveryDate: 'تاريخ التسليم', carType: 'نوع السيارة', problemDescription: 'وصف المشكلة', deviceType: 'نوع الجهاز'
        };

        let state = { user: null, shop: null, orders: [] };

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                state.user = user;
                document.getElementById('loading-screen').style.display = 'none';
                if (user) {
                    if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                        showPage('admin-dashboard');
                        loadAdminShops();
                    } else {
                        loadShopData(user.uid);
                    }
                } else {
                    showPage('login-page');
                }
            });
        };

        function showPage(id) {
            ['login-page', 'admin-dashboard', 'shop-dashboard'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function loadShopData(uid) {
            db.ref(`shops/${uid}`).on('value', snap => {
                state.shop = snap.val();
                if (state.shop) {
                    document.getElementById('shop-name-display').innerText = `مرحباً، ${state.shop.name}`;
                    updateUsageUI();
                    renderPlanBadge();
                    showPage('shop-dashboard');
                    loadOrders(uid);
                }
            });
        }

        function updateUsageUI() {
            const plan = PLANS[state.shop.plan || 'basic'];
            const usage = state.shop.usage || 0;
            const limit = plan.limit;
            const percent = Math.min((usage / limit) * 100, 100);
            document.getElementById('usage-bar').style.width = `${percent}%`;
            document.getElementById('usage-text').innerText = `الاستخدام: ${usage} / ${limit === 999999 ? 'غير محدود' : limit}`;
            if (percent >= 100) document.getElementById('usage-bar').classList.replace('bg-indigo-500', 'bg-rose-500');
            document.getElementById('customizations-info').innerText = `التخصيصات المتبقية: ${state.shop.customizationsLeft || 0}`;
        }

        function renderPlanBadge() {
            const plan = state.shop.plan || 'basic';
            const badge = document.getElementById('shop-plan-badge');
            const colors = { basic: 'bg-emerald-500/10 text-emerald-500', pro: 'bg-blue-500/10 text-blue-500', business: 'bg-rose-500/10 text-rose-500' };
            badge.innerHTML = `<span class="badge ${colors[plan]}">${PLANS[plan].name}</span>`;
        }

        function loadOrders(uid) {
            db.ref(`orders/${uid}`).on('value', snap => {
                const data = snap.val();
                state.orders = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
                renderOrders();
                renderStats();
            });
        }

        function renderOrders() {
            const grid = document.getElementById('current-orders-grid');
            grid.innerHTML = '';
            const type = SHOP_TYPES[state.shop.type || 'services'];
            state.orders.filter(o => o.status !== 'delivered').forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card fade-in';
                let fieldsHtml = '';
                type.fields.forEach(f => { if(order[f]) fieldsHtml += `<p class="text-sm text-slate-400">${FIELD_LABELS[f]}: ${order[f]}</p>`; });
                
                let buttonsHtml = '';
                Object.entries(type.labels).forEach(([key, label]) => {
                    buttonsHtml += `<button onclick="updateStatus('${order.id}', '${key}')" class="flex-1 p-2 rounded-lg bg-white/5 text-xs hover:bg-white/10">${label}</button>`;
                });

                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-xs text-indigo-400">#${order.orderId || '000'}</span>
                        <span class="badge bg-indigo-500/10 text-indigo-500">${type.labels[order.status] || order.status}</span>
                    </div>
                    <div class="mb-6 space-y-1">${fieldsHtml}</div>
                    <div class="flex gap-2">${buttonsHtml}</div>
                `;
                grid.appendChild(card);
            });
        }

        function checkLimitAndShowModal() {
            const plan = PLANS[state.shop.plan || 'basic'];
            if ((state.shop.usage || 0) >= plan.limit) {
                alert('انتهى اشتراكك، يرجى التجديد');
                return;
            }
            showModal('add-order-modal');
            renderDynamicFields();
        }

        function renderDynamicFields() {
            const container = document.getElementById('dynamic-fields');
            container.innerHTML = '';
            const type = SHOP_TYPES[state.shop.type || 'services'];
            type.fields.forEach(f => {
                const input = document.createElement('input');
                input.id = `field-${f}`;
                input.className = 'glass-input';
                input.placeholder = FIELD_LABELS[f];
                input.required = true;
                container.appendChild(input);
            });
        }

        document.getElementById('add-order-form').onsubmit = async (e) => {
            e.preventDefault();
            const type = SHOP_TYPES[state.shop.type || 'services'];
            const order = { status: 'waiting', timestamp: Date.now(), orderId: Math.floor(1000 + Math.random() * 9000) };
            type.fields.forEach(f => { order[f] = document.getElementById(`field-${f}`).value; });
            
            await db.ref(`orders/${state.user.uid}`).push(order);
            await db.ref(`shops/${state.user.uid}/usage`).set((state.shop.usage || 0) + 1);
            hideModal();
            e.target.reset();
        };

        function updateStatus(id, status) {
            db.ref(`orders/${state.user.uid}/${id}`).update({ status });
        }

        function loadAdminShops() {
            db.ref('shops').on('value', snap => {
                const shops = snap.val();
                const list = document.getElementById('admin-shops-list');
                list.innerHTML = '';
                if (shops) {
                    Object.entries(shops).forEach(([uid, shop]) => {
                        const div = document.createElement('div');
                        div.className = 'glass-card p-6 flex justify-between items-center';
                        div.innerHTML = `
                            <div>
                                <h3 class="text-xl font-bold">${shop.name} <span class="text-sm font-normal text-slate-500">(${SHOP_TYPES[shop.type]?.name})</span></h3>
                                <p class="text-sm text-slate-400">الباقة: ${PLANS[shop.plan]?.name} | الاستخدام: ${shop.usage || 0}</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="resetUsage('${uid}')" class="px-4 py-2 bg-emerald-500/10 text-emerald-500 rounded-lg text-sm">تصفير الاستخدام</button>
                                <button onclick="loginAsShop('${uid}')" class="px-6 py-2 bg-indigo-600 rounded-xl font-bold">دخول</button>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            });
        }

        async function resetUsage(uid) {
            await db.ref(`shops/${uid}/usage`).set(0);
            alert('تم تصفير الاستخدام');
        }

        document.getElementById('add-shop-form').onsubmit = async (e) => {
            e.preventDefault();
            const uid = document.getElementById('admin-shop-uid').value;
            const plan = document.getElementById('admin-shop-plan').value;
            const shopData = {
                name: document.getElementById('admin-shop-name').value,
                type: document.getElementById('admin-shop-type').value,
                plan: plan,
                usage: 0,
                customizationsLeft: PLANS[plan].customizations,
                status: 'active'
            };
            await db.ref(`shops/${uid}`).set(shopData);
            hideModal();
            alert('تم إنشاء المتجر بنجاح');
        };

        function showModal(id) { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById(id).classList.remove('hidden'); }
        function hideModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden')); }
        function logout() { auth.signOut().then(() => location.reload()); }
        function loginAsShop(uid) { loadShopData(uid); }
        function showShopSection(id) {
            ['current-orders', 'stats', 'settings'].forEach(s => document.getElementById(`${s}-section`).classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        function renderStats() {
            const grid = document.getElementById('stats-grid');
            if(!grid) return;
            const total = state.orders.length;
            const income = state.orders.reduce((acc, o) => acc + (parseFloat(o.price) || 0), 0);
            grid.innerHTML = `
                <div class="glass-card p-6 text-center"><p class="text-slate-400">إجمالي الطلبات</p><h4 class="text-3xl font-bold">${total}</h4></div>
                <div class="glass-card p-6 text-center"><p class="text-slate-400">نشطة</p><h4 class="text-3xl font-bold">${state.orders.filter(o => o.status !== 'delivered').length}</h4></div>
                <div class="glass-card p-6 text-center"><p class="text-slate-400">المبيعات</p><h4 class="text-3xl font-bold text-emerald-500">${income} ر.س</h4></div>
            `;
        }
    </script>
</body>
</html>
